<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tivipal | Premium IPTV Player for Smart TVs</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=GBP"></script>

    <style>
        :root { 
            --primary: #1A73E8; 
            --glow: rgba(26, 115, 232, 0.6);
            --bg: #0b0d11; 
            --card: rgba(22, 26, 33, 0.88); 
            --input: #1e2229; 
            --success: #00c853; 
            --text-main: #ffffff;
            --text-dim: #9ca3af;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* --- Navbar --- */
        .navbar { 
            padding: 25px 10%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: absolute; 
            width: 100%; 
            z-index: 10; 
            background: linear-gradient(to bottom, rgba(11,13,17,0.8) 0%, transparent 100%); 
        }
        .logo { font-size: 2.5rem; font-weight: 800; letter-spacing: -1.5px; cursor: pointer; }
        .logo .tivi { color: #FFFFFF; }
        .logo .pal { color: var(--primary); }

        /* --- Hero Section --- */
        .hero { 
            position: relative; 
            padding: 220px 10% 120px; 
            text-align: center; 
            background: url('https://i.ibb.co/14cTHPq/background.jpg') no-repeat center center; 
            background-size: cover; 
            min-height: 85vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .hero::before { 
            content: ""; 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at center, rgba(11,13,17,0.2) 0%, rgba(11,13,17,0.95) 100%); 
            z-index: 1; 
        }

        .hero-content { position: relative; z-index: 2; max-width: 950px; }
        .hero h1 { font-size: 3.0rem; font-weight: 800; margin-bottom: 25px; line-height: 1.05; letter-spacing: -2px; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .hero p { font-size: 1.3rem; color: #cbd5e1; margin-bottom: 45px; max-width: 750px; margin-left: auto; margin-right: auto; line-height: 1.6; }

        .btn-main { 
            background: var(--primary); 
            color: white; 
            padding: 20px 50px; 
            border-radius: 50px; 
            font-weight: 700; 
            border: none; 
            cursor: pointer; 
            font-size: 1.15rem; 
            box-shadow: 0 10px 30px rgba(26, 115, 232, 0.4); 
        }
        .btn-main:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(26, 115, 232, 0.6); }

        /* --- Platforms Section --- */
        .platforms { padding: 80px 10%; text-align: center; position: relative; z-index: 5; background: #0b0d11; }
        .platforms-list { 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 650px;
            margin: 40px auto 0;
        }
        .platform-row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            width: 100%;
            padding: 15px 30px;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .logo-tile {
            background: white;
            width: 65px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            padding: 10px;
            flex-shrink: 0;
            box-shadow: 0 0 15px var(--glow);
            animation: pulse-glow 3s infinite ease-in-out;
        }
        
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 10px var(--glow); }
            50% { box-shadow: 0 0 25px var(--glow); transform: scale(1.02); }
            100% { box-shadow: 0 0 10px var(--glow); }
        }

        .store-badge { width: 100%; height: 100%; object-fit: contain; }

        .platform-info { display: flex; align-items: center; gap: 25px; }
        .platform-name { font-weight: 600; font-size: 1.2rem; color: #fff; }
        .badge-label { font-size: 0.8rem; color: var(--primary); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .label-soon { color: #555 !important; }
        .platform-row.coming-soon { opacity: 0.5; background: rgba(255,255,255,0.01); }
        .platform-row.coming-soon .logo-tile { box-shadow: none; animation: none; background: #e0e0e0; }

        /* --- Features Section --- */
        .features { padding: 80px 10%; display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 35px; position: relative; z-index: 3; background: #0b0d11; }
        .feat-card { 
            background: var(--card); 
            padding: 50px 40px; 
            border-radius: 32px; 
            border: 1px solid rgba(255,255,255,0.07); 
            backdrop-filter: blur(14px); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.4); 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .feat-card h3 { color: var(--primary); margin-top: 0; font-size: 1.5rem; margin-bottom: 15px; font-weight: 800; }
        .feat-card p { font-size: 1rem; color: var(--text-dim); line-height: 1.7; margin: 0; }

        /* --- Modals --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.94); backdrop-filter: blur(20px); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: #161a21; width: 100%; max-width: 550px; padding: 45px; border-radius: 36px; position: relative; border: 1px solid #333; max-height: 92vh; overflow-y: auto; }
        .close-modal { position: absolute; top: 25px; right: 30px; font-size: 2rem; color: #555; cursor: pointer; border: none; background: none; }

        .section-title { font-size: 0.75rem; text-transform: uppercase; color: var(--primary); font-weight: 800; margin: 30px 0 12px; border-bottom: 1px solid #333; padding-bottom: 6px; letter-spacing: 1px; }
        input { width: 100%; padding: 18px; margin: 10px 0; border-radius: 16px; border: 1px solid #333; background: #1e2229; color: white; font-size: 1rem; outline: none; }
        
        .tab-container { display: flex; gap: 10px; margin-bottom: 15px; background: #0b0d11; padding: 6px; border-radius: 16px; border: 1px solid #222; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-weight: 700; border-radius: 12px; font-size: 0.9rem; }
        .tab-btn.active { background: var(--primary); color: white; }
