<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tivipal | Device Portal</title>
    <style>
        :root { 
            --primary: #1A73E8; 
            --bg: #0f1216; 
            --card: #1a1d23; 
            --input: #252932; 
            --success: #4CAF50; 
            --warning: #ffcc00; 
            --error: #ff4444;
        }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background: var(--card); padding: 2.5rem; border-radius: 15px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.7); border: 1px solid #333; }
        
        .logo { font-size: 2.8rem; font-weight: bold; margin-bottom: 5px; letter-spacing: 1px; cursor: default; }
        .logo .tivi { color: var(--primary); }
        .logo .pal { color: white; }
        
        .subtitle { color: #aaa; font-size: 0.95rem; margin-bottom: 25px; }
        .section-title { font-size: 0.8rem; text-transform: uppercase; color: var(--primary); font-weight: bold; margin: 25px 0 10px; text-align: left; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: var(--input); color: white; box-sizing: border-box; font-size: 1rem; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); background: #2a2f3a; }
        
        .btn { width: 100%; padding: 14px; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 1rem; margin-top: 8px; }
        .btn-primary { background: var(--primary); }
        .btn-secondary { background: #333; margin-top: 5px; font-size: 0.85rem; border: 1px solid #444; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3); }
        
        .status-box { margin-top: 15px; padding: 15px; border-radius: 8px; font-size: 0.95rem; min-height: 20px; display: none; background: rgba(255,255,255,0.03); border: 1px solid #333; line-height: 1.5; }
        #paypal-button-container { margin-top: 20px; display: none; }
        .divider { margin: 30px 0; border-top: 1px dashed #333; }
        .footer-text { font-size: 0.75rem; color: #666; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><span class="tivi">tivi</span><span class="pal">pal</span></div>
        <div class="subtitle">Official Device Management Portal</div>
        
        <input type="text" id="deviceId" placeholder="Enter Device ID (from TV app)">
        <button class="btn btn-secondary" onclick="checkStatus()">🔍 Check Device Status</button>
        <div id="statusBox" class="status-box"></div>

        <div class="section-title">Update Playlist</div>
        <input type="text" id="m3uUrl" placeholder="Paste M3U or Xtream URL here">
        <button class="btn btn-primary" onclick="uploadPlaylist()">Sync to TV</button>

        <div class="divider"></div>

        <div class="section-title">License Activation</div>
        <div id="pay-zone">
            <p id="license-info" style="font-size: 0.85rem; color: #bbb;">Lifetime access for a one-time payment of £5.99</p>
            <button id="show-pay-btn" class="btn btn-primary" onclick="showPayment()">Buy Lifetime License</button>
            <div id="paypal-button-container"></div>
        </div>
        <div class="footer-text">&copy; 2026 tivipal OTT Pro Developers</div>
    </div>

    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=GBP"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Verified Firebase Config for tivipal-cee03
        const firebaseConfig = {
            apiKey: "AIzaSyAx4WCxuXMgXqUp1CxwjHx9Ydd5s8IQTiQ",
            authDomain: "tivipal-cee03.firebaseapp.com",
            projectId: "tivipal-cee03",
            storageBucket: "tivipal-cee03.firebasestorage.app",
            messagingSenderId: "991826954037",
            appId: "1:991826954037:web:8f9a61754dc2c6e4746e7c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Auto-fill ID from URL (for QR code scans)
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.has('id')) { 
                document.getElementById('deviceId').value = params.get('id');
                checkStatus(); // Auto-check if coming from QR
            }
        };

        // STATUS CHECKER
        window.checkStatus = async () => {
            const id = document.getElementById('deviceId').value.trim().toUpperCase();
            const box = document.getElementById('statusBox');
            if (!id) return alert("Please enter your Device ID first!");

            box.style.display = 'block';
            box.innerHTML = "Fetching device record...";

            try {
                const docSnap = await getDoc(doc(db, "playlists", id));
                if (!docSnap.exists()) {
                    box.style.color = "var(--warning)";
                    box.innerHTML = "<b>Device not found.</b><br>Please open the tivipal app on your TV first to register this ID.";
                } else {
                    const data = docSnap.data();
                    if (data.isPaid) {
                        box.style.color = "var(--success)";
                        box.innerHTML = "✅ <b>Lifetime License: ACTIVE</b><br>Your device is fully activated. Enjoy!";
                        document.getElementById('pay-zone').style.display = 'none';
                    } else {
                        const startTime = data.startDate || Date.now();
                        const expiryTime = startTime + (7 * 24 * 60 * 60 * 1000);
                        const msLeft = expiryTime - Date.now();
                        const daysLeft = Math.ceil(msLeft / (1000 * 60 * 60 * 24));

                        if (daysLeft > 0) {
                            box.style.color = "var(--warning)";
                            box.innerHTML = `⏳ <b>Trial Mode</b><br>You have <b>${daysLeft} days</b> remaining in your free trial.`;
                        } else {
                            box.style.color = "var(--error)";
                            box.innerHTML = "❌ <b>Trial Expired</b><br>Your 7-day trial has ended. Please activate below.";
                        }
                    }
                }
            } catch (e) { 
                box.innerHTML = "Connection Error. Please check your internet."; 
                console.error(e);
            }
        };

        // PLAYLIST SYNC
        window.uploadPlaylist = async () => {
            const id = document.getElementById('deviceId').value.trim().toUpperCase();
            const url = document.getElementById('m3uUrl').value.trim();
            if (!id || !url) return alert("Device ID and Playlist URL are required!");

            try {
                await setDoc(doc(db, "playlists", id), { 
                    m3u_url: url, 
                    updatedAt: Date.now() 
                }, { merge: true });
                alert("Success! Your playlist has been sent to the TV.");
            } catch (e) { alert("Sync Error: " + e.message); }
        };

        // PAYPAL ACTIVATION
        window.showPayment = () => {
            const id = document.getElementById('deviceId').value.trim().toUpperCase();
            if (!id) return alert("Enter Device ID first to ensure we activate the right TV!");
            
            document.getElementById('show-pay-btn').style.display = 'none';
            document.getElementById('paypal-button-container').style.display = 'block';

            paypal.Buttons({
                createOrder: (data, actions) => {
                    return actions.order.create({
                        purchase_units: [{ 
                            amount: { value: '5.99' }, 
                            description: `tivipal Lifetime License: ${id}` 
                        }]
                    });
                },
                onApprove: (data, actions) => {
                    return actions.order.capture().then(async (details) => {
                        try {
                            await updateDoc(doc(db, "playlists", id), { 
                                isPaid: true, 
                                paidAt: Date.now(),
                                payerEmail: details.payer.email_address
                            });
                            alert('Activation Successful! Your TV app will unlock automatically.');
                            window.location.reload();
                        } catch (err) {
                            alert("Payment received, but database update failed. Screenshot this and contact support.");
                        }
                    });
                }
            }).render('#paypal-button-container');
        };
    </script>
</body>
</html>
