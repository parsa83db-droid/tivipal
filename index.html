<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tivipal | Premium IPTV Player Portal</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=GBP"></script>

    <style>
        :root { 
            --primary: #1A73E8; 
            --bg: #0b0d11; 
            --card: rgba(22, 26, 33, 0.95); 
            --text-main: #ffffff;
            --text-dim: #9ca3af;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* --- UI Components --- */
        .navbar { padding: 25px 10%; display: flex; justify-content: space-between; align-items: center; position: absolute; width: 100%; z-index: 10; }
        .logo { font-size: 1.9rem; font-weight: 800; letter-spacing: -1.5px; cursor: pointer; }
        .logo .pal { color: var(--primary); }

        .hero { 
            position: relative; padding: 220px 10% 140px; text-align: center; 
            background: url('hero-bg.jpg') no-repeat center center; background-size: cover; 
            min-height: 90vh; display: flex; align-items: center; justify-content: center; 
        }
        .hero::before { 
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, rgba(11,13,17,0.3) 0%, rgba(11,13,17,1) 90%); z-index: 1; 
        }
        .hero-content { position: relative; z-index: 2; max-width: 800px; }

        .btn-main { background: var(--primary); color: white; padding: 18px 45px; border-radius: 50px; font-weight: 700; border: none; cursor: pointer; box-shadow: 0 10px 20px rgba(26, 115, 232, 0.3); }

        /* --- Modal & Portal UI --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #161a21; width: 100%; max-width: 500px; padding: 40px; border-radius: 36px; border: 1px solid #333; position: relative; }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 1.8rem; color: #555; cursor: pointer; border: none; background: none; }

        /* Tabs for M3U / Xtream */
        .tab-container { display: flex; gap: 10px; margin-bottom: 20px; background: #0b0d11; padding: 6px; border-radius: 14px; border: 1px solid #222; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-weight: 700; border-radius: 10px; }
        .tab-btn.active { background: var(--primary); color: white; }

        .section-title { font-size: 0.75rem; text-transform: uppercase; color: var(--primary); font-weight: 800; margin: 25px 0 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        input { width: 100%; padding: 16px; margin: 8px 0; border-radius: 14px; border: 1px solid #333; background: #1e2229; color: white; font-size: 1rem; outline: none; }
        .btn-action { width: 100%; padding: 18px; border: none; color: white; font-weight: 700; border-radius: 14px; cursor: pointer; margin-top: 15px; }
        
        .status-box { margin-top: 15px; padding: 15px; border-radius: 12px; display: none; background: #0b0d11; border: 1px solid #222; font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="window.location.reload()"><span class="tivi">tivi</span><span class="pal">pal</span></div>
        <button class="btn-main" onclick="openPortal('main')">Device Portal</button>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>Premium Player for <br><span class="pal">Samsung Smart TV</span></h1>
            <p>Sync your playlists and manage your device activation remotely.</p>
            <button class="btn-main" onclick="openPortal('main')">Manage Device</button>
        </div>
    </section>

    <div id="portal-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal" onclick="closePortal()">✕</button>
            
            <div id="view-main">
                <div class="logo" style="text-align: center; margin-bottom: 20px;">tivi<span class="pal">pal</span> Portal</div>
                
                <div class="section-title">Step 1: Identify Device</div>
                <input type="text" id="deviceId" placeholder="TP-XXXXXX">
                <button class="btn-action" style="background: #333;" onclick="checkStatus()">🔍 Check Activation</button>
                <div id="statusBox" class="status-box"></div>

                <div class="section-title">Step 2: Playlist Sync</div>
                
                <div class="tab-container">
                    <button id="tab-m3u" class="tab-btn active" onclick="switchTab('m3u')">M3U URL</button>
                    <button id="tab-xtream" class="tab-btn" onclick="switchTab('xtream')">Xtream Codes</button>
                </div>

                <div id="form-m3u">
                    <input type="text" id="m3uUrl" placeholder="https://example.com/playlist.m3u">
                </div>

                <div id="form-xtream" style="display: none;">
                    <input type="text" id="xtreamHost" placeholder="Server URL (e.g. http://provider.com:80)">
                    <input type="text" id="xtreamUser" placeholder="Username">
                    <input type="password" id="xtreamPass" placeholder="Password">
                </div>

                <button class="btn-action" style="background: var(--primary);" onclick="uploadPlaylist()">Update TV App</button>

                <div class="section-title">Step 3: Lifetime License</div>
                <div id="pay-zone" style="text-align: center;">
                    <p style="color: #666; font-size: 0.85rem;">One-time fee: £5.99</p>
                    <button id="show-pay-btn" class="btn-action" style="background: var(--primary);" onclick="showPayment()">Purchase Activation</button>
                    <div id="paypal-button-container" style="margin-top: 15px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAx4WCxuXMgXqUp1CxwjHx9Ydd5s8IQTiQ",
            authDomain: "tivipal-cee03.firebaseapp.com",
            projectId: "tivipal-cee03",
            storageBucket: "tivipal-cee03.firebasestorage.app",
            messagingSenderId: "991826954037",
            appId: "1:991826954037:web:8f9a61754dc2c6e4746e7c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let activeTab = 'm3u';

        window.openPortal = () => document.getElementById('portal-modal').style.display = 'flex';
        window.closePortal = () => document.getElementById('portal-modal').style.display = 'none';

        window.switchTab = (mode) => {
            activeTab = mode;
            document.getElementById('form-m3u').style.display = mode === 'm3u' ? 'block' : 'none';
            document.getElementById('form-xtream').style.display = mode === 'xtream' ? 'block' : 'none';
            document.getElementById('tab-m3u').classList.toggle('active', mode === 'm3u');
            document.getElementById('tab-xtream').classList.toggle('active', mode === 'xtream');
        };

        window.checkStatus = async () => {
            const id = document.getElementById('deviceId').value.trim().toUpperCase();
            const box = document.getElementById('statusBox');
            if (!id) return;
            box.style.display = 'block'; box.innerHTML = "Checking...";
            const snap = await getDoc(doc(db, "playlists", id));
            if (snap.exists() && snap.data().isPaid) {
                box.style.color = "#00c853"; box.innerHTML = "✅ License Active";
                document.getElementById('pay-zone').style.display = 'none';
            } else {
                box.style.color = "#ffcc00"; box.innerHTML = snap.exists() ? "⏳ Trial Active" : "Device not found.";
            }
        };

        window.uploadPlaylist = async () => {
            const id = document.getElementById('deviceId').value.trim().toUpperCase();
            if (!id) return alert("Enter Device ID");
            
            let data = { updatedAt: Date.now(), mode: activeTab };
            if (activeTab === 'm3u') {
                data.m3u_url = document.getElementById('m3uUrl').value.trim();
                data.xtream = null;
            } else {
                data.xtream = {
                    host: document.getElementById('xtreamHost').value.trim(),
                    user: document.getElementById('xtreamUser').value.trim(),
                    pass: document.getElementById('xtreamPass').value.trim()
                };
                data.m3u_url = null;
            }

            try {
                // If security rules are active, this only works if the ID already exists
                await setDoc(doc(db, "playlists", id), data, { merge: true });
                alert("Success! Restart the TV app.");
            } catch (e) { alert("Sync failed. Ensure Device ID is correct and registered."); }
        };

        window.showPayment = () => {
            const id = document.getElementById('deviceId').value.trim().toUpperCase();
            if (!id) return alert("Enter ID first");
            document.getElementById('show-pay-btn').style.display = 'none';
            paypal.Buttons({
                createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: '5.99' }, description: `tivipal: ${id}` }] }),
                onApprove: (data, actions) => actions.order.capture().then(async () => {
                    await updateDoc(doc(db, "playlists", id), { isPaid: true });
                    window.location.reload();
                })
            }).render('#paypal-button-container');
        };
    </script>
</body>
</html>
