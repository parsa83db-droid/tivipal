<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>Trailer - tivipal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

        #player-wrap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #player      { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        #error {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            -webkit-transform: translate(-50%, -50%);
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
            background: rgba(0,0,0,0.85);
            border-radius: 12px;
            z-index: 10;
        }
        #error h2    { font-size: 26px; margin-bottom: 14px; }
        #error p     { font-size: 18px; opacity: 0.7; }
        #error-code  { font-size: 13px; opacity: 0.4; margin-top: 10px; }

        #spinner {
            position: absolute;
            top: 50%; left: 50%;
            -webkit-transform: translate(-50%, -50%);
            transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            border: 5px solid rgba(255,255,255,0.15);
            border-top-color: #fff;
            border-radius: 50%;
            -webkit-animation: spin 0.8s linear infinite;
            animation: spin 0.8s linear infinite;
        }
        @-webkit-keyframes spin {
            to { -webkit-transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="spinner"></div>
    <div id="player-wrap"><div id="player"></div></div>
    <div id="error">
        <h2>⚠️ Trailer Unavailable</h2>
        <p id="error-msg">This video cannot be played on this device</p>
        <div id="error-code"></div>
    </div>

    <script>
        var urlParams   = new URLSearchParams(window.location.search);
        var videoId     = urlParams.get('v');
        var spinner     = document.getElementById('spinner');
        var errorEl     = document.getElementById('error');
        var errorMsg    = document.getElementById('error-msg');
        var errorCode   = document.getElementById('error-code');
        var player;
        var playerReady = false;
        var unmuted     = false;

        function showError(msg, code) {
            spinner.style.display = 'none';
            errorMsg.textContent  = msg || 'This video cannot be played';
            errorCode.textContent = code ? 'Error code: ' + code : '';
            errorEl.style.display = 'block';
            // Notify parent of error
            try { window.parent.postMessage({ type: 'trailer-error', msg: msg }, '*'); } catch(e) {}
        }

        if (!videoId) {
            showError('No video ID provided');
        } else {
            var safetyTimer = setTimeout(function() {
                if (!playerReady) showError('Player took too long to load. Check network.');
            }, 12000);

            var tag = document.createElement('script');
            tag.src = 'https://www.youtube.com/iframe_api';
            tag.onerror = function() {
                clearTimeout(safetyTimer);
                showError('Could not load YouTube player (network error)');
            };
            document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, document.getElementsByTagName('script')[0]);

            window.onYouTubeIframeAPIReady = function() {
                clearTimeout(safetyTimer);
                player = new YT.Player('player', {
                    videoId: videoId,
                    host: 'https://www.youtube-nocookie.com',
                    playerVars: {
                        'origin':          'https://tivipal.co.uk',
                        'widget_referrer': 'https://tivipal.co.uk',
                        'enablejsapi':     1,
                        'autoplay':        1,
                        'mute':            1,
                        'controls':        0,   // hide YouTube controls — we use our own
                        'modestbranding':  1,
                        'rel':             0,
                        'playsinline':     1,
                        'iv_load_policy':  3,
                        'fs':              0,
                        'cc_load_policy':  0,
                        'hl':             'en'
                    },
                    events: {
                        onReady:       onPlayerReady,
                        onError:       onPlayerError,
                        onStateChange: onPlayerStateChange
                    }
                });
            };

            function onPlayerReady(event) {
                playerReady = true;
                spinner.style.display = 'none';
                // Unmute BEFORE playback begins — avoids mid-stream audio pipeline
                // restart on Tizen WebKit which causes the brief play→stop glitch.
                try {
                    event.target.unMute();
                    event.target.setVolume(100);
                    unmuted = true;
                } catch(e) {}
                // Notify parent that player is ready with duration
                try {
                    window.parent.postMessage({
                        type:     'trailer-ready',
                        duration: player.getDuration() || 0
                    }, '*');
                } catch(e) {}
            }

            function onPlayerError(event) {
                var code = event.data;
                var msg =
                    code === 2   ? 'Invalid video ID' :
                    code === 5   ? 'HTML5 player error on this device' :
                    code === 100 ? 'Video not found or private' :
                    (code === 101 || code === 150) ? 'Video owner has disabled embedding' :
                    code === 153 ? 'DRM error — video restricted on this device' :
                    'Playback error (' + code + ')';
                showError(msg, code);
            }

            function onPlayerStateChange(event) {
                var state = event.data;

                // Notify parent of state change so controls UI can update
                var stateMap = {
                    '-1': 'unstarted',
                    '0':  'ended',
                    '1':  'playing',
                    '2':  'paused',
                    '3':  'buffering',
                    '5':  'cued'
                };
                try {
                    window.parent.postMessage({
                        type:     'trailer-state',
                        state:    stateMap[String(state)] || state,
                        time:     player ? player.getCurrentTime() : 0,
                        duration: player ? player.getDuration()    : 0
                    }, '*');
                } catch(e) {}

                if (state === YT.PlayerState.ENDED) {
                    try { window.parent.postMessage({ type: 'trailer-ended' }, '*'); } catch(e) {}
                }
            }

            // ── Time ticker — sends current time to parent every 500ms for progress bar ──
            setInterval(function() {
                if (!player || !playerReady) return;
                var state = player.getPlayerState();
                if (state !== YT.PlayerState.PLAYING) return;
                try {
                    window.parent.postMessage({
                        type:     'trailer-tick',
                        time:     player.getCurrentTime(),
                        duration: player.getDuration()
                    }, '*');
                } catch(e) {}
            }, 500);
        }

        // ── Listen for commands from parent overlay ────────────────────────────
        window.addEventListener('message', function(ev) {
            if (!player || !playerReady) return;
            var msg = ev.data;
            if (!msg || typeof msg !== 'object') return;

            switch (msg.cmd) {
                case 'play':
                    player.unMute(); player.setVolume(100);
                    player.playVideo();
                    break;
                case 'pause':
                    player.pauseVideo();
                    break;
                case 'seek':
                    player.seekTo(msg.time, true);
                    break;
                case 'volume':
                    player.setVolume(msg.value);
                    if (msg.value === 0) player.mute(); else player.unMute();
                    break;
                case 'getState':
                    try {
                        window.parent.postMessage({
                            type:     'trailer-state',
                            state:    player.getPlayerState(),
                            time:     player.getCurrentTime(),
                            duration: player.getDuration()
                        }, '*');
                    } catch(e) {}
                    break;
            }
        });
    </script>
</body>
</html>
